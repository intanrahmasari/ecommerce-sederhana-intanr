<!DOCTYPE html>
<html lang="id">
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
}

/* HEADER */
header {
    background-color: white;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* MENU */
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* SECTION */
section {
    padding: 20px;
    text-align: center;
}

/* PRODUK GRID */
section div {
    display: inline-block;
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 180px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
}

/* HOVER EFFECT */
section div:hover {
    transform: translateY(-5px);
}

/* GAMBAR */
img {
    border-radius: 10px;
}

/* TOMBOL */
button {
    background-color: #ff69b4;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #ff1493;
}

/* FOOTER */
footer {
    background-color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}
</style>
